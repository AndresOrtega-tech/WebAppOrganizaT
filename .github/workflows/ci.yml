name: CI

on:
  push:
    branches: [docker_prod]
  pull_request:
    branches: [docker_prod]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Next.js build
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-build

    steps:
      - uses: actions/checkout@v4

      - name: Docker build
        run: docker build -t organizat-frontend:ci-${{ github.sha }} -f Dockerfile .
